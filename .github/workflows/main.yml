import numpy as np
from sklearn.linear_model import LogisticRegression


def preprocess_image(img: np.ndarray, target_size=(64, 64)) -> np.ndarray:
    """Normalize and resize by simple crop for CI smoke testing."""
    img = img.astype(np.float32)

    if img.ndim == 3:
        img = img.mean(axis=2)

    h, w = img.shape
    th, tw = target_size

    # simple center crop or pad
    out = np.zeros((th, tw), dtype=np.float32)
    hs = max((h - th) // 2, 0)
    ws = max((w - tw) // 2, 0)
    cropped = img[hs:hs + min(h, th), ws:ws + min(w, tw)]
    out[:cropped.shape[0], :cropped.shape[1]] = cropped

    # normalize to [0, 1]
    mn, mx = out.min(), out.max()
    out = (out - mn) / (mx - mn + 1e-8)
    return out


def cheap_radiomics_features(img: np.ndarray) -> np.ndarray:
    """Very lightweight handcrafted features."""
    flat = img.ravel()
    q25, q50, q75 = np.percentile(flat, [25, 50, 75])

    gx = np.diff(img, axis=1)
    gy = np.diff(img, axis=0)

    feats = np.array([
        flat.mean(),
        flat.std(),
        flat.min(),
        flat.max(),
        q25,
        q50,
        q75,
        np.mean(np.abs(gx)),
        np.mean(np.abs(gy)),
        np.var(gx),
        np.var(gy),
        np.mean(img[:32, :32]),
        np.mean(img[:32, 32:]),
        np.mean(img[32:, :32]),
        np.mean(img[32:, 32:]),
        np.sum(img > 0.5) / flat.size,
    ], dtype=np.float32)

    return feats


def cheap_deep_like_features(img: np.ndarray) -> np.ndarray:
    """Tiny deep-like embedding substitute for CI."""
    # 8x8 average pooling -> 64 features
    pooled = img.reshape(8, 8, 8, 8).mean(axis=(1, 3))
    return pooled.ravel().astype(np.float32)


def simple_feature_selector(X: np.ndarray, k: int = 20) -> np.ndarray:
    """Variance-based selector to imitate feature selection stage."""
    variances = np.var(X, axis=0)
    idx = np.argsort(variances)[-k:]
    return X[:, idx]


def build_tiny_dataset(n_samples=8, image_size=(80, 80), seed=42):
    rng = np.random.default_rng(seed)
    images = []
    labels = []

    for i in range(n_samples):
        img = rng.normal(loc=0.4, scale=0.15, size=image_size).astype(np.float32)

        # inject a simple class-dependent signal
        if i % 2 == 0:
            img[20:40, 20:40] += 0.25
            label = 1
        else:
            img[45:60, 45:60] -= 0.10
            label = 0

        img = np.clip(img, 0, 1)
        images.append(img)
        labels.append(label)

    return images, np.array(labels, dtype=np.int64)


def test_smoke_pipeline():
    images, y = build_tiny_dataset()

    rad_features = []
    deep_features = []

    for img in images:
        x = preprocess_image(img, target_size=(64, 64))
        rad_features.append(cheap_radiomics_features(x))
        deep_features.append(cheap_deep_like_features(x))

    X_rad = np.vstack(rad_features)
    X_deep = np.vstack(deep_features)
    X_all = np.hstack([X_rad, X_deep])

    # mimic feature selection stage
    X_sel = simple_feature_selector(X_all, k=20)

    # tiny classifier instead of heavy MLP training
    model = LogisticRegression(max_iter=100)
    model.fit(X_sel, y)
    preds = model.predict(X_sel)
    probs = model.predict_proba(X_sel)

    assert X_rad.shape[0] == len(images)
    assert X_deep.shape[0] == len(images)
    assert X_all.shape[0] == len(images)
    assert X_sel.shape == (len(images), 20)
    assert preds.shape == (len(images),)
    assert probs.shape == (len(images), 2)
    assert np.isfinite(X_all).all()
    assert np.isfinite(probs).all()
